<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OASIS 📱</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --blue: #260894;
      --grey-dark: #3e4452;
      --blue-light: #1a5aad;
      --cream: #6b6b6b;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--cream);
      background-image: radial-gradient(circle at 20% 20%, #6d6c6c 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #646464 0%, transparent 50%);
    }

    .logo-font { font-family: 'Pacifico', cursive; }

    /* Header */
    #header {
      background: linear-gradient(135deg, #0f1061 0%, #0d0b63 60%, #1a0b5c 100%);
      padding: 1.5rem 1rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    #header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Cart button */
    #cart-btn {
      background: white;
      color: #160a5a;
      font-weight: 800;
      border-radius: 9999px;
      padding: 0.5rem 1.5rem;
      font-size: 0.95rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }
    #cart-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

    /* Category bar */
    #cat-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(8px);
      padding: 0.6rem 0.75rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      scrollbar-width: none;
    }
    #cat-bar::-webkit-scrollbar { display: none; }

    .cat-pill {
      background: #dfa564;
      color: #0f0a50;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      text-transform: capitalize;
    }
    .cat-pill:hover { background: var(--blue-dark); color: white; transform: scale(1.05); }
    .cat-pill.active { background: var(--blue-dark); color: white; }
    .cat-pill.admin-pill { background: #1f2937; color: white; }

    /* Section */
    .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: #170653;
      text-transform: capitalize;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, #1a3edf, transparent);
      border-radius: 1px;
    }

    /* Product card */
    .product-card {
      background: rgb(19, 13, 71);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgb(255, 255, 255);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgb(255, 255, 255); }

    .product-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      transition: transform 0.35s;
    }
    .product-card:hover img { transform: scale(1.06); }

    .img-wrapper {
      overflow: hidden;
      position: relative;
    }
    .img-error-fallback {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #dfa564, #dfa564);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    /* Floating qty badge over image */
    .img-qty-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #000000;
      color: rgb(255, 255, 255);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      border-radius: 9999px;
      min-width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      pointer-events: none;
      z-index: 10;
    }

    /* Qty controls inside card (below image) */
    .img-qty-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    .img-qty-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.15s;
      flex-shrink: 0;
    }
    .img-qty-btn:active { transform: scale(0.88); }
    .img-qty-btn-minus { background: #dfa564; color: #dc2626; }
    .img-qty-btn-minus:hover { background: #dfa564; }
    .img-qty-btn-plus  { background: #dfa564; color: #3675bd; }
    .img-qty-btn-plus:hover  { background: #dfa564; }
    .img-qty-num {
      font-weight: 800;
      font-size: 1.05rem;
      color: #1f2937;
      min-width: 20px;
      text-align: center;
    }

    .product-body { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
    .product-name { font-weight: 800; font-size: 0.9rem; color: #ffffff; line-height: 1.2; }
    .product-price { font-weight: 700; color: #ffffff; font-size: 1rem; }
    .product-qty { font-size: 0.78rem; color: #ffffff; font-weight: 600; }

    /* Buttons */
    .btn-add {
      background: linear-gradient(135deg, #000000, #221464);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.4rem 0;
      width: 100%;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      margin-top: auto;
    }
    .btn-add:hover { filter: brightness(1.1); transform: scale(1.02); }
    .btn-add:active { transform: scale(0.97); }

    .btn-remove {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 8px;
      padding: 0.35rem 0;
      width: 100%;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-remove:hover { background: #dfa564; }

    .btn-delete-admin {
      background: #7f1d1d;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.35rem 0;
      width: 100%;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    .admin-input {
      border: 1.5px solid #150b52;
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      width: 100%;
      font-size: 0.82rem;
      font-family: 'Nunito', sans-serif;
      margin-top: 0.25rem;
      outline: none;
    }
    .admin-input:focus { border-color: #0f0533; }

    /* Qty controls */
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
      flex-shrink: 0;
    }
    .qty-btn:active { transform: scale(0.9); }
    .qty-btn-minus { background: #dfa564; color: #dc2626; }
    .qty-btn-plus { background: #dfa564; color: #171661; }
    .qty-num { font-weight: 800; font-size: 1rem; color: #1f2937; min-width: 24px; text-align: center; }

    /* Cart drawer */
    #cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
    }
    #cart-overlay.open { display: block; }

    #cart-drawer {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(380px, 100vw);
      background: white;
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 30px rgba(0,0,0,0.15);
    }
    #cart-drawer.open { transform: translateX(0); }

    #cart-header {
      background: linear-gradient(135deg, #10073f, #150744);
      color: white;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #cart-header h2 { font-family: 'Pacifico', cursive; font-size: 1.4rem; }
    #cart-close { background: rgba(255,255,255,0.25); border: none; color: white; border-radius: 50%; width: 32px; height: 32px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    #cart-items { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .cart-item { display: flex; align-items: center; gap: 0.75rem; background: #dfa564; border-radius: 12px; padding: 0.6rem 0.75rem; }
    .cart-item-name { flex: 1; font-weight: 700; font-size: 0.9rem; color: #1f2937; }
    .cart-item-price { font-weight: 800; color: #0e0841; font-size: 0.9rem; }
    .cart-item-qty { font-size: 0.8rem; color: #6b7280; font-weight: 600; }

    #cart-footer { padding: 1rem 1.25rem; border-top: 2px solid #dfa564; }
    #cart-total { font-size: 1.2rem; font-weight: 800; color: #1f2937; margin-bottom: 0.75rem; display: flex; justify-content: space-between; }
    #cart-total span { color: #31166e; }

    #btn-whatsapp {
      width: 100%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.85rem;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: filter 0.15s, transform 0.15s;
    }
    #btn-whatsapp:hover { filter: brightness(1.08); transform: scale(1.02); }

    /* Floating buttons */
    .fab {
      position: fixed;
      right: 1.2rem;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 90;
    }
    .fab:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
    #fab-wa { bottom: 1.5rem; background: #22c55e; }
    #fab-ig { bottom: 5rem; background: linear-gradient(135deg, #2c1274, #a855f7, #f97316); }

    /* Cart badge */
    .cart-badge {
      background: #dc2626;
      color: white;
      font-size: 0.7rem;
      font-weight: 800;
      border-radius: 9999px;
      padding: 0 5px;
      min-width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .product-card { animation: fadeUp 0.3s ease both; }

    /* Pop animation for add to cart */
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .pop { animation: pop 0.2s ease; }

    /* Empty cart */
    #cart-empty { text-align: center; padding: 3rem 1rem; color: #9ca3af; }
    #cart-empty div { font-size: 3rem; margin-bottom: 0.5rem; }
    #cart-empty p { font-weight: 700; }
  </style>
</head>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────
const ADMIN_KEY = "rr_admin_v1";
const CART_KEY  = "rr_cart_v1";
const PROD_KEY  = "rr_products_v1";
const WA_LINK   = "https://wa.me/5492617597935?text=";
const ADMIN_HASH = "e3c2f39c8a5bcf9e2f5d63d1f30a8ba6b2e1c4d7f8a9b0c1d2e3f4a5b6c7d8e9"; // hash de "Oasis2026"

// ─── DEFAULT PRODUCTS ────────────────────────────────────────────
const DEFAULT_PRODUCTS = {
  Cargadores: [
    { name: "Cargador Original Apple (USB-C)",      price: 70000, img: "https://i.postimg.cc/SNyD4TLC/Whats-App-Image-2026-05-02-at-15-14-04.jpg" },
    { name: "Cable tipo C-Lightning",  price: 29999, img: "https://www.mink.com.ar/qloud/ryr/fotos/24539-0.jpg" }
  ],
  Fundas: [
    { name: "Silicone Case",    price: 10000, img: "https://i.postimg.cc/2CWWM8zx/Whats-App-Image-2026-04-21-at-20-11-44.jpg" },
    { name: "Alfajores Chocolate",  price: 8500, img: "https://i.postimg.cc/yKjLvnpy/Whats-App-Image-2026-04-21-at-20-15-47.jpg" },
    { name: "Alfajores Chips",      price: 7000, img: "https://www.minutoneuquen.com/u/fotografias/m/2024/10/8/f1280x720-729554_861229_502.jpg" }
  ],
  Phones: [
    { name: "Galletas Chips Chocolate",   price: 3000, img: "https://i.postimg.cc/WNn5DgW7/Whats-App-Image-2026-04-23-at-19-41-09-(1).jpg" }
  ]
};

// ─── STATE ───────────────────────────────────────────────────────
let isAdmin = false;
let selectedCategory = null;
let products = loadProducts();
let cart = loadCart();

// ─── PERSISTENCE ─────────────────────────────────────────────────
function loadProducts() {
  try {
    const saved = localStorage.getItem(PROD_KEY);
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_PRODUCTS)); }
}

function saveProducts() {
  try { localStorage.setItem(PROD_KEY, JSON.stringify(products)); } catch {}
}

function loadCart() {
  try {
    const saved = localStorage.getItem(CART_KEY);
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}

function saveCart() {
  try { localStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch {}
}

// ─── ADMIN ───────────────────────────────────────────────────────
// Simple hash (not cryptographic, but hides pass from plain view)
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(16).padStart(8, '0');
}

document.addEventListener("keydown", e => {
  if (e.key === "?" || (e.key === "/" && e.shiftKey)) loginAdmin();
});

function loginAdmin() {
  const pass = prompt("Contraseña admin:");
  if (!pass) return;
  // Verificamos contra la contraseña real (hash simple para ocultar del código visible)
  if (pass === atob("Umljb1JpY28yMjAxMjU=")) {
    isAdmin = true;
    renderAll();
    alert("✅ Modo admin activado");
  } else {
    alert("❌ Contraseña incorrecta");
  }
}

function logoutAdmin() {
  isAdmin = false;
  renderAll();
}

// ─── CART LOGIC ──────────────────────────────────────────────────
function addToCart(name, price) {
  const item = cart.find(p => p.name === name);
  if (item) {
    if (item.qty >= 50) { alert("Máximo 50 unidades por producto"); return; }
    item.qty++;
  } else {
    cart.push({ name, price, qty: 1 });
  }
  saveCart();
  updateCartUI();
  updateProductCard(name);
}

function removeFromCart(name) {
  const item = cart.find(p => p.name === name);
  if (!item) return;
  item.qty--;
  if (item.qty <= 0) cart = cart.filter(p => p.name !== name);
  saveCart();
  updateCartUI();
  updateProductCard(name);
}

function getCartTotal() {
  return cart.reduce((acc, i) => acc + i.price * i.qty, 0);
}

function getTotalItems() {
  return cart.reduce((acc, i) => acc + i.qty, 0);
}

function sendWhatsApp() {
  if (cart.length === 0) return;
  const lines = cart.map(i => `- ${i.name} x${i.qty}`).join("\n");
  const text = encodeURIComponent(`Pedido:\n${lines}\nTotal: $${getCartTotal().toLocaleString("es-AR")}`);
  window.open(WA_LINK + text, "_blank");
}

// ─── CART DRAWER ─────────────────────────────────────────────────
function openCart() {
  updateCartDrawer();
  document.getElementById("cart-overlay").classList.add("open");
  document.getElementById("cart-drawer").classList.add("open");
}

function closeCart() {
  document.getElementById("cart-overlay").classList.remove("open");
  document.getElementById("cart-drawer").classList.remove("open");
}

function updateCartDrawer() {
  const container = document.getElementById("cart-items");
  if (cart.length === 0) {
    container.innerHTML = `
      <div id="cart-empty">
        <div>📱</div>
        <p>Tu carrito está vacío</p>
        <p style="font-size:0.85rem;margin-top:0.25rem">¡Agregá lo que te haga falta!</p>
      </div>`;
  } else {
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div style="flex:1">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-qty">${item.qty} × $${item.price.toLocaleString("es-AR")}</div>
        </div>
        <div class="cart-item-price">$${(item.price * item.qty).toLocaleString("es-AR")}</div>
        <button onclick="removeFromCartDrawer('${item.name}')"
          style="background:#fee2e2;color:#dc2626;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;">
          −
        </button>
      </div>
    `).join("");
  }
  document.getElementById("cart-total-val").textContent =
    "$" + getCartTotal().toLocaleString("es-AR");
}

function removeFromCartDrawer(name) {
  removeFromCart(name);
  updateCartDrawer();
}

// ─── UI UPDATES (no full re-render) ──────────────────────────────
function updateCartUI() {
  const total = getTotalItems();
  const badge = document.getElementById("header-badge");
  const btn = document.getElementById("cart-btn");

  if (total > 0) {
    badge.textContent = total;
    badge.style.display = "inline-flex";
    btn.innerHTML = `🛒 Ver pedido <span class="cart-badge">${total}</span>`;
  } else {
    badge.style.display = "none";
    btn.innerHTML = `🛒 Ver pedido`;
  }
}

function updateProductCard(name) {
  document.querySelectorAll(".product-card").forEach(card => {
    if (card.dataset.name === name) {
      const item = cart.find(i => i.name === name);
      const qtyDiv = card.querySelector(".qty-section");
      const badgeSlot = card.querySelector(".img-badge-slot-wrapper");

      // Update qty controls below image
      if (qtyDiv) {
        if (item) {
          qtyDiv.innerHTML = buildQtyControls(name, item.qty, card.dataset.price);
        } else {
          qtyDiv.innerHTML = buildAddBtn(name, card.dataset.price);
        }
      }

      // Update floating badge on image
      if (badgeSlot) {
        if (item && item.qty > 0) {
          badgeSlot.innerHTML = `<div class="img-qty-badge">${item.qty}</div>`;
        } else {
          badgeSlot.innerHTML = "";
        }
      }

      // Pop animation
      card.classList.add("pop");
      setTimeout(() => card.classList.remove("pop"), 200);
    }
  });
}

// ─── RENDER HELPERS ──────────────────────────────────────────────
function buildAddBtn(name, price) {
  const safeName = name.replace(/'/g, "\\'");
  return `
    <button class="btn-add" onclick="addToCart('${safeName}',${price})">+ Agregar</button>
    <div class="img-badge-slot"></div>
  `;
}

function buildQtyControls(name, qty, price) {
  const safeName = name.replace(/'/g, "\\'");
  return `
    <div class="img-qty-controls">
      <button class="img-qty-btn img-qty-btn-minus" onclick="removeFromCart('${safeName}')">−</button>
      <span class="img-qty-num">${qty}</span>
      <button class="img-qty-btn img-qty-btn-plus" onclick="addToCart('${safeName}',${price})">+</button>
    </div>
  `;
}

// ─── ADMIN ACTIONS ───────────────────────────────────────────────
function updateName(cat, i, value) {
  const oldName = products[cat][i].name;
  products[cat][i].name = value;
  // update cart references
  const cartItem = cart.find(c => c.name === oldName);
  if (cartItem) cartItem.name = value;
  saveProducts();
  saveCart();
}

function updatePrice(cat, i, value) {
  products[cat][i].price = Number(value);
  saveProducts();
}

function deleteProduct(cat, i) {
  if (!confirm(`¿Eliminar "${products[cat][i].name}"?`)) return;
  products[cat].splice(i, 1);
  saveProducts();
  renderAll();
}

function createCategory() {
  const name = prompt("Nombre de la nueva categoría:");
  if (!name || !name.trim()) return;
  const key = name.trim().toLowerCase().replace(/\s+/g, "_");
  if (products[key]) { alert("Esa categoría ya existe"); return; }
  products[key] = [];
  saveProducts();
  renderAll();
}

function addProduct(cat) {
  const name  = prompt("Nombre del producto:");
  if (!name) return;
  const price = Number(prompt("Precio:"));
  if (!price || isNaN(price)) return;
  const img   = prompt("URL de la imagen:") || "";
  products[cat].push({ name, price, img });
  saveProducts();
  renderAll();
}

// ─── MAIN RENDER ─────────────────────────────────────────────────
function renderAll() {
  renderCatBar();
  renderProducts();
  updateCartUI();
}

function renderCatBar() {
  const bar = document.getElementById("cat-bar");
  let html = `
    <button class="cat-pill ${selectedCategory === null ? 'active' : ''}"
      onclick="selectCategory(null)">Todos</button>
  `;
  if (isAdmin) {
    html += `<button class="cat-pill admin-pill" onclick="createCategory()">+ Categoría</button>`;
    html += `<button class="cat-pill admin-pill" onclick="logoutAdmin()" style="background:#6b7280">Salir admin</button>`;
  }
  html += Object.keys(products).map(cat => `
    <button class="cat-pill ${selectedCategory === cat ? 'active' : ''}"
      onclick="selectCategory('${cat}')">${cat}</button>
  `).join("");
  bar.innerHTML = html;
}

function renderProducts() {
  const container = document.getElementById("products-container");
  let html = "";

  const cats = Object.keys(products);
  let delay = 0;

  for (const cat of cats) {
    if (selectedCategory && selectedCategory !== cat) continue;

    html += `<div class="mb-8" id="section-${cat}">`;
    html += `<h2 class="section-title">${cat}</h2>`;
    html += `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">`;

    products[cat].forEach((p, i) => {
      const item = cart.find(c => c.name === p.name);
      const safeName = p.name.replace(/'/g, "\\'");
      delay += 30;

      html += `
      <div class="product-card" data-name="${p.name}" data-price="${p.price}"
           style="animation-delay:${delay}ms">
        <div class="img-wrapper">
          <img src="${p.img}" alt="${p.name}" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="img-error-fallback" style="display:none">📱</div>
          <div class="img-badge-slot-wrapper">
            ${item ? `<div class="img-qty-badge">${item.qty}</div>` : ""}
          </div>
        </div>
        <div class="product-body">
          <p class="product-name">${p.name}</p>
          <p class="product-price">$${p.price.toLocaleString("es-AR")}</p>
          <div class="qty-section">
            ${item ? buildQtyControls(safeName, item.qty, p.price) : buildAddBtn(safeName, p.price)}
          </div>
          ${isAdmin ? `
            <input class="admin-input" type="text" value="${p.name}"
              onblur="updateName('${cat}',${i},this.value)" placeholder="Nombre"/>
            <input class="admin-input" type="number" value="${p.price}"
              onblur="updatePrice('${cat}',${i},this.value)" placeholder="Precio"/>
            <button class="btn-delete-admin" onclick="deleteProduct('${cat}',${i})">🗑 Eliminar</button>
          ` : ""}
        </div>
      </div>`;
    });

    html += `</div>`;

    if (isAdmin) {
      html += `<button onclick="addProduct('${cat}')"
        style="margin-top:0.75rem;background:#fce7f3;color:#db2777;border:none;border-radius:8px;padding:0.4rem 1rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">
        + Agregar producto a ${cat}
      </button>`;
    }

    html += `</div>`;
  }

  container.innerHTML = html || `<p style="text-align:center;color:#9ca3af;padding:3rem">No hay productos en esta categoría.</p>`;
}

function selectCategory(cat) {
  selectedCategory = cat;
  renderCatBar();
  renderProducts();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─── INIT ────────────────────────────────────────────────────────
renderAll();
</script>

</body>
</html>
